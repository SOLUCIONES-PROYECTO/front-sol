<div class="min-h-screen bg-[#F5F5F7] flex items-center justify-center px-4 py-10">

  <div class="bg-white w-full max-w-3xl rounded-3xl shadow-sm px-10 py-12">

    <!-- Título -->
    <h1 class="text-5xl font-bold text-center text-[#1F090A] mb-4">
      Crear Cuenta
    </h1>

    <!-- Texto -->
    <div class="text-center mb-10">
      <span class="text-gray-400">
        ¿Ya tienes una cuenta?
      </span>

      <a
        routerLink="/auth/login"
        class="text-[#531E1E] ml-2 hover:underline"
      >
        Iniciar sesión
      </a>
    </div>

    <!-- Formulario -->
    <form
      [formGroup]="registerFormPresenter.Form"
      (ngSubmit)="registrarUsuario()"
      class="space-y-6"
    >

      <!-- Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Nombres -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Nombres
          </label>

          <input
            type="text"
            formControlName="nombres"
            placeholder="Ingresa tus nombres"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Apellidos -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Apellidos
          </label>

          <input
            type="text"
            formControlName="apellidos"
            placeholder="Ingresa tus apellidos"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- DNI -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            DNI
          </label>

          <input
            type="text"
            formControlName="dni"
            placeholder="Ingresa tu DNI"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Teléfono -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Teléfono
          </label>

          <input
            type="text"
            formControlName="telefono"
            placeholder="Ingresa tu teléfono"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Correo -->
        <div class="md:col-span-2">

          <label class="block text-gray-400 mb-2 text-sm">
            Correo electrónico
          </label>

          <input
            type="email"
            formControlName="email"
            placeholder="Ingresa tu correo electrónico"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Dirección -->
        <div class="md:col-span-2">

          <label class="block text-gray-400 mb-2 text-sm">
            Dirección
          </label>

          <input
            type="text"
            formControlName="direccion"
            placeholder="Ingresa tu dirección"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Fecha nacimiento -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Fecha de nacimiento
          </label>

          <input
            type="date"
            formControlName="fechaNacimiento"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Género -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Género
          </label>

          <select
            formControlName="genero"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >
            <option value="">Selecciona tu género</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
            <option value="Otro">Otro</option>
          </select>

        </div>

        <!-- Contraseña -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Contraseña
          </label>

          <input
            type="password"
            formControlName="password"
            placeholder="Ingresa tu contraseña"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

        <!-- Confirmar contraseña -->
        <div>

          <label class="block text-gray-400 mb-2 text-sm">
            Confirmar contraseña
          </label>

          <input
            type="password"
            formControlName="confirmarPassword"
            placeholder="Confirma tu contraseña"
            class="w-full border border-gray-200 rounded-md px-4 py-4 outline-none focus:border-[#531E1E]"
          >

        </div>

      </div>

      <!-- Botón -->
      <button
        type="submit"
        class="w-full bg-[#531E1E] hover:opacity-90 transition text-white py-4 rounded-md text-lg font-medium mt-4"
      >
        Crear Cuenta
      </button>

    </form>

  </div>

</div>
