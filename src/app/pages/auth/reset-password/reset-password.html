<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center shadow-lg">
        <lucide-icon name="lock-keyhole" class="w-8 h-8 text-white"></lucide-icon>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900">
      Nueva Contraseña
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Por favor, escribe tu nueva contraseña.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
      
      <!-- Notification -->
      <div *ngIf="notification" class="mb-6 p-4 rounded-md" 
           [ngClass]="{'bg-green-50 text-green-700': notification.type === 'success', 'bg-red-50 text-red-700': notification.type === 'error'}">
        {{ notification.message }}
      </div>

      <div *ngIf="!tokenValido && !success">
        <div class="text-center text-red-600 mb-4">
          <lucide-icon name="alert-circle" class="w-12 h-12 mx-auto mb-2"></lucide-icon>
          <p>El enlace es inválido o no está presente en la URL.</p>
        </div>
        <div class="mt-6">
          <a routerLink="/auth/login" class="flex w-full justify-center rounded-md border border-transparent bg-primary py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-primary-600">
            Volver al Login
          </a>
        </div>
      </div>

      <form *ngIf="tokenValido" class="space-y-6" (ngSubmit)="resetear()">
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Nueva Contraseña</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <lucide-icon name="lock" class="h-5 w-5 text-gray-400"></lucide-icon>
            </div>
            <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="nuevaContrasena" name="password" required minlength="8"
              pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$"
              class="block w-full pl-10 pr-10 py-2 sm:text-sm border-gray-300 rounded-md focus:ring-primary focus:border-primary bg-gray-50 text-gray-900"
              placeholder="Nueva contraseña">
            
            <button type="button" (click)="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
              <lucide-icon [name]="showPassword ? 'eye-off' : 'eye'" class="h-5 w-5"></lucide-icon>
            </button>
          </div>
          <p class="mt-2 text-xs text-gray-500">Mínimo 8 caracteres, 1 mayúscula, 1 número y 1 carácter especial (@$!%*?&).</p>
        </div>

        <div>
          <button type="submit" [disabled]="isLoading || nuevaContrasena.length < 8"
            class="flex w-full justify-center rounded-md border border-transparent bg-primary py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
            
            <lucide-icon *ngIf="isLoading" name="loader-circle" class="animate-spin -ml-1 mr-2 h-5 w-5"></lucide-icon>
            {{ isLoading ? 'Guardando...' : 'Guardar Nueva Contraseña' }}
          </button>
        </div>
      </form>
      
      <div *ngIf="success" class="mt-6">
        <a routerLink="/auth/login" class="flex w-full justify-center rounded-md border border-gray-300 bg-white py-2 px-4 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50">
          Ir a Iniciar Sesión
        </a>
      </div>

    </div>
  </div>
</div>
