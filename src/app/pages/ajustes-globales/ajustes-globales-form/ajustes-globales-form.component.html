<app-form-layout [title]="tituloFormulario" (onBack)="Regresar()">

  <div general class="space-y-6">

    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-bold mb-4 text-[#1F090A]">Información personal</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Nombre <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="persona.nombre" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Apellido <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="persona.apellido" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">DNI <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="persona.dni" maxlength="8" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Teléfono <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="persona.telefono" maxlength="9" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>

        <div class="col-span-2 flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Correo <span class="text-red-500">*</span></label>
          <input type="email" [(ngModel)]="persona.correo" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>

      </div>
    </section>

    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-bold mb-4 text-[#1F090A]">Rol en la empresa</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Cargo <span class="text-red-500">*</span></label>
          <select [(ngModel)]="empleado.cargo" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg appearance-none disabled:opacity-60 disabled:cursor-not-allowed">
            <option value="">Selecciona</option>
            <option *ngFor="let c of cargos" [value]="c.nombre">{{ c.nombre }}</option>
          </select>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Área <span class="text-red-500">*</span></label>
          <select [(ngModel)]="empleado.area" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg appearance-none disabled:opacity-60 disabled:cursor-not-allowed">
            <option value="">Selecciona</option>
            <option *ngFor="let a of areas" [value]="a.nombre">{{ a.nombre }}</option>
          </select>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Turno de trabajo <span class="text-red-500">*</span></label>
          <select [(ngModel)]="empleado.turnoTrabajo" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg appearance-none disabled:opacity-60 disabled:cursor-not-allowed">
            <option value="">Selecciona</option>
            <option *ngFor="let t of turnos" [value]="t">{{ t }}</option>
          </select>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-500">Estado <span class="text-red-500">*</span></label>
          <select [(ngModel)]="empleado.estado" [disabled]="modoVista"
            class="w-full bg-white border border-gray-200 p-2.5 rounded-lg appearance-none disabled:opacity-60 disabled:cursor-not-allowed">
            <option value="">Selecciona</option>
            <option *ngFor="let e of estados" [value]="e">{{ e }}</option>
          </select>
        </div>

      </div>
    </section>

  </div>

  <div sidebar>
    <h3 class="text-lg font-bold mb-4 text-[#1F090A]">Acceso al sistema</h3>
    <div class="space-y-4">

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-500">Usuario del sistema</label>
        <input type="text" [value]="empleado.usuarioSistema" disabled
          class="w-full bg-[#F3F4F9] border-none p-2.5 rounded-lg text-gray-500" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-500">Rol</label>
        <input type="text" [value]="empleado.rol" disabled
          class="w-full bg-[#F3F4F9] border-none p-2.5 rounded-lg text-gray-500" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-500">Supervisor directo</label>
        <input type="text" [value]="empleado.supervisorDirecto" disabled
          class="w-full bg-[#F3F4F9] border-none p-2.5 rounded-lg text-gray-500" />
      </div>

    </div>
  </div>

  <div actions class="flex items-center justify-end gap-3">
    <button
      class="px-8 py-2.5 rounded-lg border border-gray-300 text-gray-500 font-medium hover:bg-gray-50 transition-colors"
      (click)="Regresar()">
      {{ modoVista ? 'Regresar' : 'Cancelar' }}
    </button>
    <button *ngIf="!modoVista" (click)="guardar()" [disabled]="guardando"
      class="px-8 py-2.5 rounded-lg bg-[#531E1E] text-white font-medium hover:opacity-95 transition-colors disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
      <svg *ngIf="guardando" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
    </button>
  </div>

</app-form-layout>

<app-alert-modal
  [visible]="showAlertModal"
  [title]="alertTitle"
  [message]="alertMessage"
  [type]="alertType"
  (close)="onCerrarAlerta()"> </app-alert-modal>
