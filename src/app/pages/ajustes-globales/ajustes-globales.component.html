<app-crud-table
  [title]="'Ajustes Globales'"
  [columns]="columns"
  [data]="data"
  [filters]="filters"
  keyField="id"
  [canAdd]="false"
  (searchChange)="buscar($event)"
  (filterChange)="filtrar($event)"
  (onEdit)="onEditar($event)"
  (onDelete)="onEliminar($event)"
  (onView)="onVer($event)">
</app-crud-table>
