<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Configuración de Perfil</h2>

  <form (submit)="guardarCambios()" class="space-y-6">
    
    <div class="space-y-4">
      <h3 class="font-semibold text-gray-600">Datos Personales</h3>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Nombre</label>
        <input type="text" [(ngModel)]="usuario.nombre" name="nombre" class="w-full mt-1 p-2 border border-gray-300 rounded-md">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Correo</label>
        <input type="email" [(ngModel)]="usuario.correo" name="correo" class="w-full mt-1 p-2 border border-gray-300 rounded-md">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Año de Nacimiento</label>
        <input type="number" [(ngModel)]="usuario.anio" name="anio" 
               min="1900" max="2026" 
               oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);"
               class="w-full mt-1 p-2 border border-gray-300 rounded-md" placeholder="YYYY">
      </div>
    </div>

    <div class="space-y-4 pt-4 border-t">
      <h3 class="font-semibold text-gray-600">Seguridad</h3>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Nueva Contraseña</label>
        <input type="password" [(ngModel)]="usuario.password" name="password" (input)="verificarFuerza()"
               class="w-full mt-1 p-2 border border-gray-300 rounded-md" placeholder="••••••••">
        <div class="mt-1 text-sm font-bold" [ngClass]="{
          'text-red-500': fuerzaPassword === 'Débil',
          'text-yellow-500': fuerzaPassword === 'Media',
          'text-green-500': fuerzaPassword === 'Fuerte'
        }">
          {{ fuerzaPassword ? 'Seguridad: ' + fuerzaPassword : '' }}
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Confirmar Contraseña</label>
        <input type="password" [(ngModel)]="confirmarPassword" name="confirmarPassword"
               class="w-full mt-1 p-2 border border-gray-300 rounded-md" placeholder="••••••••">
        <div *ngIf="confirmarPassword && usuario.password !== confirmarPassword" class="text-red-500 text-xs mt-1">
          Las contraseñas no coinciden.
        </div>
      </div>
    </div>

    <button type="submit" 
            style="background-color: #230A08;"
            class="w-full mt-4 text-white py-2 rounded-md hover:opacity-90 transition font-semibold">
      Guardar Cambios
    </button>
  </form>
</div>
