<app-crud-table
  [title]="'Egresos'"
  [columns]="columns"
  [data]="data"
  [filters]="filters"
  keyField="documento"
  [canDeleteItem]="puedeEliminar"
  cannotDeleteMessage="No puedes eliminar egresos de tipo Devolución, ya que afectaron el stock."
  (searchChange)="buscar($event)"
  (filterChange)="filtrar($event)"
  (onAdd)="agregarEgreso()"
  (onEdit)="editarEgreso($event)"
  (onDelete)="eliminarEgresos($event)"
  (onView)="verEgreso($event)">
</app-crud-table>
