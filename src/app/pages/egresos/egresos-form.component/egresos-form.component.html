<app-form-layout title="Añadir Egreso" (onBack)="Regresar()">

  <div general class="space-y-8">
    
    <section>
      <h3 class="text-xl font-bold mb-5 text-[#1F090A]">Información</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Código del producto</label>
          <input type="text" placeholder="CO-090-64" class="w-full bg-[#F3F4F9] border-none p-3 rounded-lg focus:ring-2 focus:ring-brown-500" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Categoría</label>
          <select class="w-full bg-[#F3F4F9] border-none p-3 rounded-lg appearance-none">
            <option>Selecciona</option>
          </select>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Nombre del Producto</label>
          <input type="text" placeholder="Leche Gloria" class="w-full bg-[#F3F4F9] border-none p-3 rounded-lg" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Unidad de Medida</label>
          <select class="w-full bg-[#F3F4F9] border-none p-3 rounded-lg appearance-none">
            <option>Selecciona</option>
          </select>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="space-y-6">
        <section>
          <h3 class="text-xl font-bold mb-5">Información del producto</h3>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-gray-700">Stock mínimo</label>
            <input type="text" placeholder="1.50" class="w-full bg-white border border-gray-200 p-3 rounded-lg" />
          </div>
          <div class="flex flex-col gap-2 mt-4">
            <label class="text-sm font-medium text-gray-700">Proveedor</label>
            <select class="w-full bg-white border border-gray-200 p-3 rounded-lg appearance-none">
              <option>Selecciona</option>
            </select>
          </div>
        </section>

        <section>
          <h3 class="text-xl font-bold mb-5">Estado de Producto</h3>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-gray-700">Estado</label>
            <select class="w-full bg-[#F3F4F9] border-none p-3 rounded-lg appearance-none">
              <option>Selecciona</option>
            </select>
          </div>
        </section>
      </div>

      <div class="flex flex-col">
        <h3 class="text-xl font-bold mb-5">Imagen</h3>
        <div class="border-2 border-dashed border-gray-200 rounded-xl p-10 flex flex-col items-center justify-center bg-white h-full min-h-[250px]">
          <button class="bg-[#531E1E] text-white px-6 py-2.5 rounded-lg mb-2 hover:opacity-90 transition">Añadir Archivo</button>
          <p class="text-xs text-gray-400">O arrastrar archivo</p>
        </div>
      </div>
    </div>

    <section>
      <label class="text-sm font-medium text-gray-700 block mb-2">Descripción del producto</label>
      <textarea rows="5" placeholder="Ingrese una breve descripcion" class="w-full border border-gray-200 rounded-lg p-3"></textarea>
    </section>
  </div>

  <div sidebar>
    <h3 class="text-xl font-bold mb-6 text-[#1F090A]">Precio</h3>
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Precio Compra</label>
        <input type="text" placeholder="3.00" class="w-full border border-gray-200 p-2.5 rounded-lg" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Precio Venta</label>
        <input type="text" placeholder="1.50" class="w-full border border-gray-200 p-2.5 rounded-lg" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Margen</label>
        <input type="text" class="w-full border border-gray-200 p-2.5 rounded-lg bg-gray-50" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Ganancia</label>
        <input type="text" class="w-full border border-gray-200 p-2.5 rounded-lg bg-gray-50" />
      </div>
    </div>
  </div>

  <div actions>
    <button class="px-6 py-2.5 rounded-lg border border-[#531E1E] text-[#531E1E] font-medium hover:bg-gray-50 transition-colors">
      Cancelar
    </button>
    <button class="px-6 py-2.5 rounded-lg bg-[#531E1E] text-white font-medium hover:opacity-95 transition-colors">
      Guardar
    </button>
  </div>

</app-form-layout>
