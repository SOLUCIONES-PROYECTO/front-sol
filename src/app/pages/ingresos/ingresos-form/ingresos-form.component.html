<app-form-layout title="Registrar Ingreso" (onBack)="Regresar()">

  <div general class="space-y-6">
    
    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-bold mb-4 text-[#1F090A]">Información general</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">N° Documento</label>
          <input type="text" placeholder="#007" class="w-full bg-[#F3F4F9] border-none p-2.5 rounded-lg focus:ring-2 focus:ring-brown-500" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Fecha de Ingreso</label>
          <input type="date" class="w-full bg-[#F3F4F9] border-none p-2.5 rounded-lg" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Proveedor</label>
          <select class="w-full bg-white border border-gray-200 p-2.5 rounded-lg appearance-none">
            <option>Selecciona</option>
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Tipo de ingreso</label>
          <select class="w-full bg-white border border-gray-200 p-2.5 rounded-lg appearance-none">
            <option>Selecciona</option>
          </select>
        </div>
        <div class="col-span-2 flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Descripcion sobre alguna incidencia</label>
          <textarea rows="3" placeholder="Ingrese una breve descripcion" class="w-full border border-gray-200 rounded-lg p-3"></textarea>
        </div>
      </div>
    </section>

    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-lg font-bold text-[#1F090A]">Productos de Ingreso</h3>
        <div class="flex gap-2">
          <div class="relative">
            <input type="text" placeholder="Buscar producto por código o nombre" class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg w-64 text-sm" />
          </div>
          <button class="bg-[#531E1E] text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90">
            + Agregar Producto
          </button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="bg-gray-50 text-gray-500 font-semibold border-b border-gray-100">
              <th class="px-4 py-3">Producto</th>
              <th class="px-4 py-3">Lote</th>
              <th class="px-4 py-3">Vencimiento</th>
              <th class="px-4 py-3">Cantidad</th>
              <th class="px-4 py-3">Precio Compra</th>
              <th class="px-4 py-3">Subtotal</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50">
            <tr>
              <td class="px-4 py-4">
                <p class="font-medium text-gray-800">Galleta Oreo 154 g</p>
                <span class="text-xs text-gray-400">GALE-0001</span>
              </td>
              <td class="px-4 py-4 text-gray-500 text-xs">L-2456-01</td>
              <td class="px-4 py-4"><input type="date" class="border border-gray-200 rounded p-1 text-xs" /></td>
              <td class="px-4 py-4 text-gray-500">55</td>
              <td class="px-4 py-4 text-gray-500">S/. 1.50</td>
              <td class="px-4 py-4 text-gray-500">S/. 8.00</td>
              <td class="px-4 py-4 text-red-500 cursor-pointer">🗑️</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-bold mb-4 text-[#1F090A]">Pago y estado</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Método de pago</label>
          <select class="w-full bg-white border border-gray-200 p-2.5 rounded-lg">
            <option>Selecciona</option>
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Estado de ingreso</label>
          <select class="w-full bg-white border border-gray-200 p-2.5 rounded-lg">
            <option>Selecciona</option>
          </select>
        </div>
      </div>
    </section>
  </div>

  <div sidebar class="space-y-6">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-bold mb-4 text-[#1F090A]">Responsable</h3>
      <div class="space-y-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Registrado por</label>
          <select class="w-full border border-gray-200 p-2.5 rounded-lg">
            <option>Selecciona</option>
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-gray-600">Cargo</label>
          <input type="text" placeholder="Almacenero" disabled class="w-full bg-[#F3F4F9] border-none p-2.5 rounded-lg text-gray-500" />
        </div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-bold mb-6 text-[#1F090A]">Resumen de ingreso</h3>
      <div class="space-y-4">
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">Total de productos</span>
          <span class="font-semibold text-gray-800">3</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">Total de unidades</span>
          <span class="font-semibold text-gray-800">30</span>
        </div>
        <hr class="border-gray-100" />
        <div class="flex justify-between items-center pt-2">
          <span class="text-gray-500 text-sm">Total de ingreso</span>
          <span class="text-xl font-bold text-[#1F090A]">S/. 450.00</span>
        </div>
      </div>
    </div>
  </div>

  <div actions>
    <button class="px-8 py-2.5 rounded-lg border border-gray-300 text-gray-600 font-medium hover:bg-gray-50 transition-colors">
      Cancelar
    </button>
    <button class="px-8 py-2.5 rounded-lg bg-[#531E1E] text-white font-medium hover:opacity-95 transition-colors">
      Registrar Ingreso
    </button>
  </div>

</app-form-layout>
