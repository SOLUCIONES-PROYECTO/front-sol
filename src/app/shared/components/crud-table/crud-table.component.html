<div class="bg-[#F5F5F7] min-h-screen p-6">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-[#1F090A]">{{ title }}</h1>
      <p class="text-gray-400 text-sm mt-1">Gestiona los registros de {{ title.toLowerCase() }}</p>
    </div>

    <button class="bg-primary-600 text-white px-5 py-2 rounded-md hover:opacity-90 transition flex items-center gap-2"
      (click)="onAdd.emit()">
      <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
      {{ addButtonText }}
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">

    <div class="flex items-center justify-between mb-5">

      <div class="flex items-center gap-3">
        <app-filter-panel [filters]="filters" (filterChange)="filterChange.emit($event)">
        </app-filter-panel>
        <input type="text" placeholder="Buscar..." (input)="onSearch($event)"
          class="border border-gray-200 rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:ring-1 focus:ring-primary-600">
      </div>

      <div class="flex items-center gap-2">
        <button class="border border-gray-200 p-2 rounded-md transition" [ngClass]="canEdit
    ? 'bg-[var(--color-primary-100)] hover:bg-[var(--color-primary-200)] cursor-pointer'
    : 'opacity-40 cursor-not-allowed'" [disabled]="!canEdit" (click)="requestEdit()">
          <lucide-icon name="pencil" class="w-4 h-4 text-primary-600"></lucide-icon>
        </button>
        <button class="border border-gray-200 p-2 rounded-md transition" [ngClass]="selectedKeys.size > 0
      ? 'bg-red-50 border-red-200 hover:bg-red-100 cursor-pointer'
      : 'opacity-40 cursor-not-allowed'" (click)="openDeleteModal()" [disabled]="selectedKeys.size === 0">
          <lucide-icon name="trash" class="w-4 h-4"
            [ngClass]="selectedKeys.size > 0 ? 'text-danger' : 'text-primary-600'">
          </lucide-icon>
        </button>
      </div>

    </div>

    <div class="overflow-x-auto min-h-[420px]">
      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-200 text-gray-500 text-sm">
            <th class="text-left py-3 px-2">
              <input type="checkbox" [checked]="allSelected" (change)="toggleSelectAll()"
                class="accent-primary-600 w-3.5 h-3.5 cursor-pointer">
            </th>
            <th *ngFor="let column of columns" class="text-left py-3 px-2 font-medium">{{ column.label }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of data"
  (click)="viewItem(item)"
  class="border-b border-gray-100 hover:bg-gray-50 transition cursor-pointer">
            <td class="py-4 px-2">
  <input type="checkbox"
    [checked]="isSelected(item)"
    (click)="$event.stopPropagation()"
    (change)="toggleSelect(item)"
    class="accent-primary-600 w-3.5 h-3.5 cursor-pointer">
</td>
            <td *ngFor="let column of columns" class="py-4 px-2 text-sm text-gray-700">
              <ng-container *ngIf="column.type === 'badge'; else normalValue">
                <span class="badge-base" [ngClass]="{
                  'badge-pagado':        item[column.key] === 'Pagado' || item[column.key] === 'Factura' || item[column.key] === 'Boleta',
                  'badge-agotado':       item[column.key] === 'Agotado',
                  'badge-transferencia': item[column.key] === 'Transferencia' || item[column.key] === 'transferencia',
                  'badge-yape':          item[column.key] === 'Yape',
                  'badge-efectivo':      item[column.key] === 'Efectivo',
                  'badge-disponible':    item[column.key] === 'Disponible',
                  'badge-recibido':      item[column.key] === 'Recibido',
                  'badge-pendiente':     item[column.key] === 'Pendiente',
                  'badge-completado':    item[column.key] === 'Completado',
                  'badge-encamino':      item[column.key] === 'En camino',
                  'badge-generada':      item[column.key] === 'Generada',
                  'badge-activo':        item[column.key] === 'Activo',
                  'badge-inactivo':      item[column.key] === 'Inactivo',
                  'badge-bajo-stock':    item[column.key] === 'Bajo Stock'
                }">
                  {{ item[column.key] }}
                </span>
              </ng-container>
              <ng-template #normalValue>{{ item[column.key] }}</ng-template>
            </td>
          </tr>
          <!-- Estado vacío -->
          <tr *ngIf="data.length === 0">
            <td [attr.colspan]="columns.length + 1" class="py-16 text-center">
              <div class="flex flex-col items-center gap-2 text-gray-400">
                <lucide-icon name="search" class="w-8 h-8 opacity-40"></lucide-icon>
                <p class="text-sm font-medium">Sin resultados</p>
                <p class="text-xs">Intenta ajustar los filtros o la búsqueda</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="flex items-center justify-between border-t border-gray-100 px-4 py-4 mt-5">
      <div class="flex flex-1 justify-between sm:hidden">
        <button
          class="relative inline-flex items-center rounded-md border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Anterior</button>
        <button
          class="relative ml-3 inline-flex items-center rounded-md border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Siguiente</button>
      </div>

      <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
        <div>
          <p class="text-sm text-gray-500">
            Mostrando
            <span class="font-medium">{{ data.length === 0 ? 0 : 1 }}</span>
            a
            <span class="font-medium">{{ data.length }}</span>
            de
            <span class="font-medium">{{ data.length }}</span>
            resultados
          </p>
        </div>
        <div>
          <nav aria-label="Pagination" class="isolate inline-flex -space-x-px rounded-md shadow-xs">
            <button
              class="relative inline-flex items-center rounded-l-md px-3 py-2 text-gray-400 ring-1 ring-gray-200 hover:bg-gray-50">
              <lucide-icon name="chevron-left" class="w-4 h-4"></lucide-icon>
            </button>
            <button
              class="relative z-10 inline-flex items-center bg-primary-600 px-4 py-2 text-sm font-semibold text-white">1</button>
            <button
              class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-gray-200 hover:bg-gray-50">2</button>
            <button
              class="relative hidden md:inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-gray-200 hover:bg-gray-50">3</button>
            <span
              class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-400 ring-1 ring-gray-200">...</span>
            <button
              class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-gray-200 hover:bg-gray-50">8</button>
            <button
              class="relative inline-flex items-center rounded-r-md px-3 py-2 text-gray-400 ring-1 ring-gray-200 hover:bg-gray-50">
              <lucide-icon name="chevron-right" class="w-4 h-4"></lucide-icon>
            </button>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
<app-confirm-modal
  [visible]="showDeleteModal"
  title="¿Eliminar registros?"
  [message]="deleteMessage"
  confirmText="Sí, eliminar"
  cancelText="Cancelar"
  icon="trash"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirm-modal>

<app-confirm-modal
  [visible]="showBlockedModal"
  title="No se puede eliminar"
  [message]="cannotDeleteMessage"
  confirmText="Entendido"
  cancelText="Cerrar"
  icon="trash"
  (confirm)="closeBlockedModal()"
  (cancel)="closeBlockedModal()">
</app-confirm-modal>
