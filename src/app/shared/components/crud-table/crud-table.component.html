<div class="bg-[#F5F5F7] min-h-screen p-6">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-[#1F090A]">{{ title }}</h1>
      <p class="text-gray-400 text-sm mt-1">Gestiona los registros de {{ title.toLowerCase() }}</p>
    </div>

    <button *ngIf="!readOnly && canAdd"
      class="bg-[#531E1E] text-white px-5 py-2 rounded-md hover:opacity-90 transition flex items-center gap-2"
      (click)="onAdd.emit()">
      <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
      {{ addButtonText }}
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">

    <div class="flex items-center justify-between mb-5">

      <div class="flex items-center gap-3">
        <app-filter-panel [filters]="filters" (filterChange)="filterChange.emit($event)">
        </app-filter-panel>
        <input type="text" placeholder="Buscar..." (input)="onSearch($event)"
          class="border border-gray-200 rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:ring-1 focus:ring-[#531E1E]">
      </div>

      <div *ngIf="!readOnly" class="flex items-center gap-2">
        <button class="border border-gray-200 p-2 rounded-md transition" [ngClass]="canEdit
    ? 'bg-[var(--color-primary-100)] hover:bg-[var(--color-primary-200)] cursor-pointer'
    : 'opacity-40 cursor-not-allowed'" [disabled]="!canEdit" (click)="requestEdit()">
          <lucide-icon name="pencil" class="w-4 h-4 text-[#531E1E]"></lucide-icon>
        </button>
        <button class="border border-gray-200 p-2 rounded-md transition" [ngClass]="selectedKeys.size > 0
      ? 'bg-red-50 border-red-200 hover:bg-red-100 cursor-pointer'
      : 'opacity-40 cursor-not-allowed'" (click)="openDeleteModal()" [disabled]="selectedKeys.size === 0">
          <lucide-icon name="trash" class="w-4 h-4"
            [ngClass]="selectedKeys.size > 0 ? 'text-red-500' : 'text-[#531E1E]'">
          </lucide-icon>
        </button>
      </div>

    </div>

    <div class="overflow-x-auto min-h-[420px]">
      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-200 text-gray-500 text-sm">
            <th *ngIf="!readOnly" class="text-left py-3 px-2">
              <input type="checkbox" [checked]="allSelected" (change)="toggleSelectAll()"
                class="accent-[#531E1E] w-3.5 h-3.5 cursor-pointer">
            </th>
            <th *ngFor="let column of columns" class="text-left py-3 px-2 font-medium">{{ column.label }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of paginatedData" (click)="viewItem(item)"
            class="border-b border-gray-100 hover:bg-gray-50 transition cursor-pointer">
            <td *ngIf="!readOnly" class="py-4 px-2">
              <input type="checkbox" [checked]="isSelected(item)" (click)="$event.stopPropagation()"
                (change)="toggleSelect(item)" class="accent-[#531E1E] w-3.5 h-3.5 cursor-pointer">
            </td>
            <td *ngFor="let column of columns" class="py-4 px-2 text-sm text-gray-700">

              <ng-container *ngIf="column.type === 'image'; else checkBadge">
                <img *ngIf="item[column.key]" [src]="item[column.key]"
                  class="w-10 h-10 rounded-lg object-cover border border-gray-100" />
                <span *ngIf="!item[column.key]" class="text-xs text-gray-400">Sin imagen</span>
              </ng-container>
              <ng-template #checkBadge>
                <ng-container *ngIf="column.type === 'badge'; else normalValue">
                  <span class="px-3 py-1 rounded-full text-xs font-medium" [ngClass]="{
                  'bg-[var(--color-badge-recibido-bg)]      text-[var(--color-badge-recibido-text)]':      item[column.key] === 'Recibido',
                  'bg-[var(--color-badge-devuelto-bg)]      text-[var(--color-badge-devuelto-text)]':      item[column.key] === 'Devuelto',
                  'bg-[var(--color-badge-observado-bg)]     text-[var(--color-badge-observado-text)]':     item[column.key] === 'Observado',

          
                  'bg-[var(--color-badge-tarjeta-bg)]       text-[var(--color-badge-tarjeta-text)]':       item[column.key] === 'Tarjeta',
                  'bg-[var(--color-badge-yape-bg)]          text-[var(--color-badge-yape-text)]':          item[column.key] === 'Yape',
                  'bg-[var(--color-badge-efectivo-bg)]      text-[var(--color-badge-efectivo-text)]':      item[column.key] === 'Efectivo',
                  'bg-[var(--color-badge-noaplica-bg)]       text-[var(--color-badge-noaplica-text)]':       item[column.key] === 'No Aplica',

           
                  'bg-[var(--color-badge-disponible-bg)]    text-[var(--color-badge-disponible-text)]':    item[column.key] === 'Disponible',
                  'bg-[var(--color-badge-agotado-bg)]       text-[var(--color-badge-agotado-text)]':       item[column.key] === 'Agotado',
                  'bg-[var(--color-badge-vencido-bg)]       text-[var(--color-badge-vencido-text)]':       item[column.key] === 'Vencido',

          
                  'bg-[var(--color-badge-aprobada-bg)]      text-[var(--color-badge-aprobada-text)]':      item[column.key] === 'Aprobada',
                  'bg-[var(--color-badge-borrador-bg)]      text-[var(--color-badge-borrador-text)]':      item[column.key] === 'Borrador',
                  'bg-[var(--color-badge-enviada-bg)]       text-[var(--color-badge-enviada-text)]':       item[column.key] === 'Enviada',
                  'bg-[var(--color-badge-recibida-bg)]      text-[var(--color-badge-recibida-text)]':      item[column.key] === 'Recibida',
                  'bg-[var(--color-badge-anulada-bg)]       text-[var(--color-badge-anulada-text)]':       item[column.key] === 'Anulada',

                  'bg-[var(--color-badge-activo-bg)]     text-[var(--color-badge-activo-text)]':     item[column.key] === 'Activo',
                  'bg-[var(--color-badge-inactivo-bg)]   text-[var(--color-badge-inactivo-text)]':   item[column.key] === 'Inactivo',                                     
                }">
                    {{ item[column.key] }}
                  </span>
                </ng-container>
              </ng-template>

              <ng-template #normalValue>{{ item[column.key] }}</ng-template>
          </tr>
          <!-- Estado vacío -->
          <tr *ngIf="data.length === 0">
            <td [attr.colspan]="columns.length + 1" class="py-16 text-center">
              <div class="flex flex-col items-center gap-2 text-gray-400">
                <lucide-icon name="search" class="w-8 h-8 opacity-40"></lucide-icon>
                <p class="text-sm font-medium">Sin resultados</p>
                <p class="text-xs">Intenta ajustar los filtros o la búsqueda</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="flex items-center justify-between border-t border-gray-100 px-4 py-4 mt-5">
      <div class="flex flex-1 justify-between sm:hidden">
        <button (click)="paginaAnterior()" [disabled]="currentPage === 1"
          class="relative inline-flex items-center rounded-md border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">Anterior</button>
        <button (click)="paginaSiguiente()" [disabled]="currentPage === totalPages"
          class="relative ml-3 inline-flex items-center rounded-md border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">Siguiente</button>
      </div>

      <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
        <div>
          <p class="text-sm text-gray-500">
            Mostrando
            <span class="font-medium">{{ rangoInicio }}</span>
            a
            <span class="font-medium">{{ rangoFin }}</span>
            de
            <span class="font-medium">{{ data.length }}</span>
            resultados
          </p>
        </div>
        <div>
          <nav aria-label="Pagination" class="isolate inline-flex -space-x-px rounded-md shadow-xs">
            <button (click)="paginaAnterior()" [disabled]="currentPage === 1"
              class="relative inline-flex items-center rounded-l-md px-3 py-2 text-gray-400 ring-1 ring-gray-200 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              <lucide-icon name="chevron-left" class="w-4 h-4"></lucide-icon>
            </button>

            <button *ngFor="let pagina of pageNumbers" (click)="irAPagina(pagina)"
              class="relative inline-flex items-center px-4 py-2 text-sm font-semibold ring-1 ring-gray-200 hover:bg-gray-50"
              [ngClass]="pagina === currentPage ? 'z-10 bg-[#531E1E] text-white hover:bg-[#531E1E]' : 'text-gray-700'">
              {{ pagina }}
            </button>

            <button (click)="paginaSiguiente()" [disabled]="currentPage === totalPages"
              class="relative inline-flex items-center rounded-r-md px-3 py-2 text-gray-400 ring-1 ring-gray-200 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              <lucide-icon name="chevron-right" class="w-4 h-4"></lucide-icon>
            </button>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
<app-confirm-modal [visible]="showDeleteModal" title="¿Eliminar registros?" [message]="deleteMessage"
  confirmText="Sí, eliminar" cancelText="Cancelar" icon="trash" (confirm)="confirmDelete()" (cancel)="cancelDelete()">
</app-confirm-modal>

<app-confirm-modal [visible]="showBlockedModal" title="No se puede eliminar" [message]="cannotDeleteMessage"
  confirmText="Entendido" cancelText="Cerrar" icon="trash" (confirm)="closeBlockedModal()"
  (cancel)="closeBlockedModal()">
</app-confirm-modal>
