<nav class="bg-[var(--color-primary-700)] w-full px-6 py-3 shadow-md">
  <div class="flex items-center justify-between">

    <img src="/img/logo.png" alt="Logo Bodega Yessy" class="h-16 w-auto cursor-pointer" routerLink="/home">

    @if (!isLoggedIn) {
    <button routerLink="/auth/login"
      class="bg-white text-[var(--color-primary-700)] font-semibold px-5 py-2 rounded-lg hover:bg-[var(--color-primary-100)] transition">
      Iniciar sesión
    </button>
    }

    @if (isLoggedIn) {
    <div class="relative">

      <button (click)="toggleMenu()"
        class="flex items-center gap-3 px-3 py-2 rounded-xl transition hover:bg-white/10">

        <div class="w-10 h-10 rounded-full bg-[var(--color-primary-100)] text-[var(--color-primary-700)] flex items-center justify-center font-bold text-sm ring-2 ring-white/20">
          {{ usuarioSistema.charAt(0).toUpperCase() }}
        </div>

        <div class="text-left hidden sm:block">
          <p class="font-medium text-sm text-white leading-tight">
            {{ usuarioSistema }}
          </p>
          <p class="text-xs text-[var(--color-primary-200)] leading-tight">
            {{ cargo }}
          </p>
        </div>

        <lucide-icon name="chevron-down" class="w-4 h-4 text-[var(--color-primary-200)] transition-transform"
          [ngClass]="{ 'rotate-180': menuAbierto }">
        </lucide-icon>

      </button>

      @if (menuAbierto) {

      <div class="absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-50">

        <div class="px-4 py-4 bg-[var(--color-primary-100)] flex items-center gap-3">
          <div class="w-11 h-11 rounded-full bg-white text-[var(--color-primary-700)] flex items-center justify-center font-bold ring-2 ring-[var(--color-primary-200)]">
            {{ usuarioSistema.charAt(0) }}
          </div>
          <div>
            <p class="font-semibold text-[var(--color-primary-700)] text-sm">
              {{ usuarioSistema }}
            </p>
            <span class="inline-block mt-0.5 text-[10px] font-semibold uppercase tracking-wide text-[var(--color-primary-600)] bg-white px-2 py-0.5 rounded-full">
              {{ cargo }}
            </span>
          </div>
        </div>

        <div class="py-1">
          <button (click)="logout()"
            class="w-full flex items-center gap-3 text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50 transition">
            <lucide-icon name="log-out" class="w-4 h-4"></lucide-icon>
            Cerrar sesión
          </button>
        </div>

      </div>
      }
    </div>
    }
  </div>
</nav>
