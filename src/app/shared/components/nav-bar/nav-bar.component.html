<nav class="bg-[#1F090A] w-full px-6 py-4 shadow-md">
  <div class="flex items-center justify-between">

    <!-- Logo -->
    <img
      src="/img/logo.png"
      alt="Logo Bodega Yessy"
      class="h-12 w-auto cursor-pointer"
      routerLink="/home">

    <!-- NO AUTENTICADO -->
    @if (!isLoggedIn) {

      <button
        routerLink="/auth/login"
        class="bg-white text-[#1E0909] font-semibold px-5 py-2 rounded-lg hover:opacity-90 transition">

        Iniciar sesión

      </button>

    }

    <!-- AUTENTICADO -->
    @if (isLoggedIn) {

      <div class="relative">

        <button
          (click)="toggleMenu()"
          class="flex items-center gap-3 text-white px-4 py-2 rounded-xl transition">

          <div
            class="w-9 h-9 rounded-full bg-white text-[#1F090A] flex items-center justify-center font-bold">

            {{ usuarioSistema.charAt(0).toUpperCase() }}

          </div>

          <div class="text-left">

            <p class="font-medium text-sm">
              {{ usuarioSistema }}
            </p>

            <p class="text-xs text-gray-300">
              {{ rol }}
            </p>

          </div>

          <span class="text-xs">▼</span>

        </button>

        @if (menuAbierto) {

          <div
            class="absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-xl border overflow-hidden z-50">

            <div class="px-4 py-3 bg-gray-50">

              <p class="font-semibold text-gray-800">
                {{ usuarioSistema }}
              </p>

              <p class="text-sm text-gray-500">
                {{ rol }}
              </p>

            </div>

            <button
              (click)="logout()"
              class="w-full text-left px-4 py-3 hover:bg-red-50 text-red-600 transition">

              Cerrar sesión

            </button>

          </div>

        }

      </div>

    }

  </div>
</nav>
