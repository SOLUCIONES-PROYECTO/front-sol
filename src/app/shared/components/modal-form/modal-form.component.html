<div *ngIf="visible"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">

    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h2 class="text-lg font-semibold text-[var(--color-primary-700)]">{{ title }}</h2>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 transition">
        <lucide-icon name="x" class="w-5 h-5"></lucide-icon>
      </button>
    </div>

    <div class="px-6 py-5">
      <ng-content></ng-content>
    </div>

    <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100">
      <button (click)="onCancel()"
        class="px-5 py-2 rounded-lg border border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition">
        {{ cancelText }}
      </button>
      <button (click)="onConfirm()" [disabled]="confirmDisabled"
        class="px-5 py-2 rounded-lg bg-[var(--color-primary-600)] hover:bg-[var(--color-primary-700)] text-white font-medium transition disabled:opacity-40 disabled:cursor-not-allowed">
        {{ confirmText }}
      </button>
    </div>

  </div>
</div>
