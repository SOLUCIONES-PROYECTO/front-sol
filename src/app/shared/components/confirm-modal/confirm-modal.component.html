<div *ngIf="visible"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-6">

    <div class="flex flex-col items-center text-center gap-3 mb-6">
      <div class="bg-[var(--color-primary-100)] rounded-full p-3">
        <lucide-icon [name]="icon" class="w-6 h-6 text-[var(--color-primary-500)]"></lucide-icon>
      </div>
      <h2 class="text-lg font-semibold text-[var(--color-primary-700)]">{{ title }}</h2>
      <p class="text-sm text-gray-500">{{ message }}</p>
    </div>

    <div class="flex gap-3">
      <button
        (click)="onCancel()"
        class="flex-1 border border-gray-200 rounded-lg py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
        {{ cancelText }}
      </button>
      <button
        (click)="onConfirm()"
        class="flex-1 bg-[var(--color-primary-600)] hover:bg-[var(--color-primary-700)] text-white rounded-lg py-2 text-sm font-medium transition">
        {{ confirmText }}
      </button>
    </div>

  </div>
</div>
